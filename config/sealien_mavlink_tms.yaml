# Sealien TMS MAVLink bridge runtime configuration.
#
# MSGID reference (protocol v1.5, worksheet: mavlink).
# Use numeric MSGIDs in messages.rx/tx.
# 0 HEARTBEAT, 1 IMU_DATA, 2 THRUSTER_STATUS, 3 GS_STATUS, 4 LED_STATUS
# 5 VCHECK, 6 HEIGHT_STATUS, 7 DEPTH_STATUS, 8 BEM280, 9 SWITCH_STATUS
# 10 THRUSTER_CMD, 11 THRUSTER_LOCK, 12 IMU_CALIB, 13 IMU_CLEAR
# 14 LED_CMD, 15 GS_CMD, 16 GS_CFG, 17 SWITCH_CMD, 18 DVL_DATA
# 19 MIXED_IO_CMD, 20 MIXED_IO_DATA, 21 VALVE_CMD, 22 VALVE_STATUS

sealien_mavlink_bridge:
  dialect: "tools/sealien_mavlink.xml"

  host:
    system_id: 15
    component_id: 0
    bind_ip: "0.0.0.0"
    bind_port: 9999

  heartbeat:
    host_tx_hz: 1.0
    endpoint_expected_hz: 1.0
    endpoint_timeout_ms: 3000

  endpoints:
    - name: "tms_mcu"
      enabled: true
      system_id: 200
      component_id: 0
      remote_ip: "192.168.100.200"
      remote_port: 49153
      # A MSGID may appear in both rx and tx when the TMS protocol requires
      # bidirectional request/response or mirrored status/control frames.
      messages:
        rx: [0, 9]
        tx: [0, 17]
